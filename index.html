<!doctype html>
<html lang="ar" dir="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c1526" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Medical Caravan System</title>
    <meta name="description" content="A professional medical clinic caravan management system for coordinating patient registration, vital signs, examinations, and reporting." />
    <meta name="author" content="Hazem Ahmed" />
    <meta property="og:title" content="Medical Caravan System" />
    <meta property="og:description" content="Professional medical clinic caravan management — fast, mobile-friendly, and real-time." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      /* ── CSS Loading Splash — prevents white flash before React mounts ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        background: linear-gradient(135deg,
          #0c1526 0%,
          #0d2240 30%,
          #0a3040 60%,
          #0c1a33 100%
        );
        font-family: 'Segoe UI', sans-serif;
      }
      #root { min-height: 100dvh; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 20px;
        background: linear-gradient(135deg, #0c1526 0%, #0d2240 35%, #0a3040 65%, #0c1a33 100%);
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      .splash-icon {
        width: 72px; height: 72px; border-radius: 50%;
        background: rgba(255,255,255,0.08);
        display: flex; align-items: center; justify-content: center;
        animation: splashPulse 2s ease-in-out infinite;
      }
      .splash-icon svg { width: 40px; height: 40px; color: #22d3ee; }
      .splash-title { color: #f0f8ff; font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
      .splash-sub { color: rgba(255,255,255,0.45); font-size: 13px; }
      .splash-spinner {
        width: 36px; height: 36px; border-radius: 50%;
        border: 3px solid rgba(34,211,238,0.2);
        border-top-color: #22d3ee;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes splashPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(34,211,238,0); }
        50% { box-shadow: 0 0 0 12px rgba(34,211,238,0.08); }
      }
    </style>
  </head>

  <body>
    <!-- Loading splash shown before React mounts -->
    <div id="splash">
      <div class="splash-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/>
          <path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/>
          <circle cx="20" cy="10" r="2"/>
        </svg>
      </div>
      <div class="splash-title">Medical Caravan System</div>
      <div class="splash-sub">Clinic Management Platform</div>
      <div class="splash-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
